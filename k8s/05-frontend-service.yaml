apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: fincorp
  labels:
    app: frontend
spec:
  # ClusterIP - Ingress (06-ingress.yaml) is the public entry point.
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
