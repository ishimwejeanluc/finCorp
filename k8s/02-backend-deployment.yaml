apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: fincorp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fincorp
  labels:
    app: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend
      containers:
        - name: backend
          # Placeholder tag — ALWAYS overridden at deploy time with the commit
          # SHA by `kubectl set image` (pipeline) or deploy-eks-k8s.sh --image-tag.
          image: 497924967546.dkr.ecr.eu-west-1.amazonaws.com/fincorp/backend:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: fincorp-db
                  key: POSTGRES_DSN
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: fincorp-db
                  key: REDIS_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
