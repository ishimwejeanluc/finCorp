name: build-and-push

# Secure supply-chain pipeline:
#   CodeArtifact (npm/pip proxy) -> build -> Trivy gate (fail on HIGH/CRITICAL)
#   -> push immutable :<git-sha> image to ECR -> deploy to EKS.
#
# Auth is GitHub OIDC -> AWS (no static keys). Configure these repo-level
# Variables (Settings > Secrets and variables > Actions > Variables):
#   AWS_GHA_ROLE_ARN   = terraform output gha_ci_role_arn
#   AWS_REGION         = eu-west-1
#   AWS_ACCOUNT_ID     = 497924967546
#   CODEARTIFACT_DOMAIN= fincorp
#   EKS_CLUSTER        = fincorp
#   K8S_NAMESPACE      = fincorp

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write       # required for OIDC
  contents: read
  security-events: write # upload Trivy SARIF to the Security tab

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}   # full commit SHA = unique, immutable tag

jobs:
  build:
    name: build-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: backend
            context: backend
            ecosystem: pip
          - service: frontend
            context: frontend
            ecosystem: npm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get CodeArtifact token + endpoints
        id: ca
        run: |
          DOMAIN="${{ vars.CODEARTIFACT_DOMAIN }}"
          OWNER="${{ vars.AWS_ACCOUNT_ID }}"
          REGION="${{ env.AWS_REGION }}"
          TOKEN="$(aws codeartifact get-authorization-token \
            --domain "$DOMAIN" --domain-owner "$OWNER" \
            --region "$REGION" --query authorizationToken --output text)"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          HOST="${DOMAIN}-${OWNER}.d.codeartifact.${REGION}.amazonaws.com"
          echo "npm_host=${HOST}/npm/npm-proxy" >> "$GITHUB_OUTPUT"
          echo "pip_host=${HOST}/pypi/pypi-proxy/simple/" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build image (deps pulled through CodeArtifact)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true            # load locally so we can scan BEFORE pushing
          push: false
          tags: ${{ env.ECR_REGISTRY }}/fincorp/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          secrets: |
            ca_token=${{ steps.ca.outputs.token }}
          build-args: |
            NPM_REGISTRY_HOST=${{ matrix.ecosystem == 'npm' && steps.ca.outputs.npm_host || '' }}
            PIP_INDEX_HOST=${{ matrix.ecosystem == 'pip' && steps.ca.outputs.pip_host || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy scan (FAIL on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/fincorp/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"          # <-- the constraint: build fails on HIGH/CRITICAL

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Push immutable image
        # Reached only if Trivy passed. ECR rejects the push if this exact tag
        # already exists (IMMUTABLE) — a tag can never be overwritten.
        run: docker push ${{ env.ECR_REGISTRY }}/fincorp/${{ matrix.service }}:${{ env.IMAGE_TAG }}

  deploy:
    name: deploy-to-eks
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER }} --region ${{ vars.AWS_REGION }}

      - name: Roll out the new (commit-pinned) images
        env:
          REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          NS: ${{ vars.K8S_NAMESPACE }}
        run: |
          kubectl -n "$NS" set image deployment/backend  backend=$REGISTRY/fincorp/backend:${{ github.sha }}
          kubectl -n "$NS" set image deployment/frontend frontend=$REGISTRY/fincorp/frontend:${{ github.sha }}
          kubectl -n "$NS" rollout status deployment/backend  --timeout=180s
          kubectl -n "$NS" rollout status deployment/frontend --timeout=180s
