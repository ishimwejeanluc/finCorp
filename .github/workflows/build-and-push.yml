name: build-and-push

# Secure supply-chain pipeline:
#   CodeArtifact (npm/pip proxy) -> build -> Trivy gate (fail on HIGH/CRITICAL)
#   -> push immutable :<git-sha> image to ECR -> deploy to EKS.
#
# Auth is GitHub OIDC -> AWS (no static keys). Configure these repo-level
# Variables (Settings > Secrets and variables > Actions > Variables):
#   AWS_GHA_ROLE_ARN   = terraform output gha_ci_role_arn
#   AWS_REGION         = eu-west-1
#   AWS_ACCOUNT_ID     = 497924967546
#   CODEARTIFACT_DOMAIN= fincorp
#   EKS_CLUSTER        = fincorp
#   K8S_NAMESPACE      = fincorp

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write       # required for OIDC
  contents: read
  security-events: write # upload Trivy SARIF to the Security tab

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}   # full commit SHA = unique, immutable tag

jobs:
  build:
    name: build-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # let backend and frontend scan independently (one failing must not cancel the other)
      matrix:
        include:
          - service: backend
            context: backend
            ecosystem: pip
          - service: frontend
            context: frontend
            ecosystem: npm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Skip if this immutable tag already exists
        id: exists
        run: |
          if aws ecr describe-images \
               --repository-name fincorp/${{ matrix.service }} \
               --image-ids imageTag=${{ env.IMAGE_TAG }} \
               --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "::notice::fincorp/${{ matrix.service }}:${{ env.IMAGE_TAG }} already exists — skipping build/scan/push (immutable, nothing to do)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get CodeArtifact token + endpoints
        if: steps.exists.outputs.found != 'true'
        id: ca
        run: |
          DOMAIN="${{ vars.CODEARTIFACT_DOMAIN }}"
          OWNER="${{ vars.AWS_ACCOUNT_ID }}"
          REGION="${{ env.AWS_REGION }}"
          TOKEN="$(aws codeartifact get-authorization-token \
            --domain "$DOMAIN" --domain-owner "$OWNER" \
            --region "$REGION" --query authorizationToken --output text)"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          HOST="${DOMAIN}-${OWNER}.d.codeartifact.${REGION}.amazonaws.com"
          echo "npm_host=${HOST}/npm/npm-proxy" >> "$GITHUB_OUTPUT"
          echo "pip_host=${HOST}/pypi/pypi-proxy/simple/" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
        if: steps.exists.outputs.found != 'true'

      - name: Build image (deps pulled through CodeArtifact)
        if: steps.exists.outputs.found != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true            # load locally so we can scan BEFORE pushing
          push: false
          tags: ${{ env.ECR_REGISTRY }}/fincorp/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          secrets: |
            ca_token=${{ steps.ca.outputs.token }}
          build-args: |
            NPM_REGISTRY_HOST=${{ matrix.ecosystem == 'npm' && steps.ca.outputs.npm_host || '' }}
            PIP_INDEX_HOST=${{ matrix.ecosystem == 'pip' && steps.ca.outputs.pip_host || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # Scan once to a table report AND gate on it. Trivy writes the report file
      # before applying exit-code, so the file exists even when the gate fails.
      - name: Trivy scan (report + GATE on HIGH/CRITICAL)
        if: steps.exists.outputs.found != 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/fincorp/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: table
          output: trivy-${{ matrix.service }}.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"          # <-- the constraint: build fails on HIGH/CRITICAL

      # Runs even when the gate fails (always) so the full CVE list is visible
      # on the run's Summary page — package, installed → fixed version, CVE id.
      - name: Publish Trivy report to job summary
        if: always() && steps.exists.outputs.found != 'true'
        run: |
          {
            echo "## 🔎 Trivy — ${{ matrix.service }}"
            echo "Image \`fincorp/${{ matrix.service }}:${{ env.IMAGE_TAG }}\` — HIGH/CRITICAL, fixable only"
            echo ""
            echo '```'
            if [ -s trivy-${{ matrix.service }}.txt ]; then
              cat trivy-${{ matrix.service }}.txt
            else
              echo "No fixable HIGH/CRITICAL vulnerabilities found. ✅"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push immutable image
        # Reached only if the tag is new AND Trivy passed. ECR would reject an
        # overwrite anyway (IMMUTABLE) — the existence check above turns a
        # same-commit re-run into a clean skip instead of a failed push.
        if: steps.exists.outputs.found != 'true'
        run: docker push ${{ env.ECR_REGISTRY }}/fincorp/${{ matrix.service }}:${{ env.IMAGE_TAG }}

  deploy:
    name: deploy-to-eks
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # scripts/deploy-eks-k8s.sh is the single source of truth for deploys
      # (used identically here and locally): updates kubeconfig, creates the
      # namespace + fincorp-db Secret, renders the image tag, and applies the
      # manifests + ingress declaratively. The LB controller is a one-time local
      # setup (--ensure-lb-controller), so it is NOT installed here.
      - name: Deploy to EKS (idempotent, self-bootstrapping)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          CLUSTER_NAME: ${{ vars.EKS_CLUSTER }}
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          chmod +x scripts/deploy-eks-k8s.sh
          ./scripts/deploy-eks-k8s.sh --image-tag "${{ github.sha }}" --include-ingress
