name: dr-restore

# Cross-region Disaster Recovery — FULL region rebuild (manual failover).
#
# Rebuilds the entire stack in the DR region (eu-west-2) and lands the database
# next to it, so the recovered app and DB sit together and connect locally:
#   1. terraform apply infra/live-dr   (VPC, EKS, Redis, RDS landing)
#   2. restore the DB from the latest AWS Backup recovery point INTO that VPC
#   3. reset its password + attach the DR security group
#   4. deploy the app onto the DR cluster, pointing at the local DB
#
# Run this AFTER simulating the region failure (destroying the primary stack).
# workflow_dispatch ONLY — a full rebuild is deliberate, never automatic on push.
#
# Requires repo Variables:
#   AWS_GHA_ROLE_ARN            OIDC CI role (least-privilege deploy/restore role)
#   BACKUP_ROLE_ARN            AWS Backup service role (persistent output backup_role_arn)
#   AWS_DR_PROVISIONER_ROLE_ARN (optional) role with rights to `terraform apply`
#                              the DR stack (EKS/EC2/IAM/ElastiCache). Falls back to
#                              AWS_GHA_ROLE_ARN — which is scoped for deploy, NOT for
#                              provisioning, so set this (or run the rebuild locally).

on:
  workflow_dispatch:
    inputs:
      new_db_identifier:
        description: "Identifier for the restored instance"
        required: true
        default: "fincorp-db-restored"
      rebuild_infra:
        description: "terraform apply the DR stack (off if it is already built)"
        type: boolean
        default: true
      replace:
        description: "If the restored instance already exists, delete it and restore fresh"
        type: boolean
        default: false
      deploy_app:
        description: "Deploy the app onto the DR cluster after the restore"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  restore:
    name: rebuild-and-restore-in-dr-region
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up Helm (for the LB controller install)
        uses: azure/setup-helm@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Provisioning the DR stack needs broad rights; use the dedicated
          # provisioner role if set, else fall back to the CI role.
          role-to-assume: ${{ vars.AWS_DR_PROVISIONER_ROLE_ARN || vars.AWS_GHA_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Full DR recovery (rebuild infra + restore DB + deploy app)
        env:
          PROJECT: fincorp
          DR_REGION: eu-west-2
          NEW_DB_ID: ${{ github.event.inputs.new_db_identifier }}
          REBUILD_INFRA: ${{ github.event.inputs.rebuild_infra }}
          REPLACE: ${{ github.event.inputs.replace }}
          DEPLOY_APP: ${{ github.event.inputs.deploy_app }}
          BACKUP_ROLE_ARN: ${{ vars.BACKUP_ROLE_ARN }}
        run: |
          chmod +x scripts/dr-restore.sh scripts/deploy-eks-k8s.sh
          ./scripts/dr-restore.sh
